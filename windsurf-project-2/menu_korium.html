<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korium Style Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: transparent;
            overflow: hidden;
            user-select: none;
        }

        .menu-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            background: #000000;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            display: none;
        }

        .menu-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -48%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .menu-header {
            background: #000000;
            padding: 20px 24px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-logo {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .menu-title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .menu-tabs {
            display: flex;
            background: #000000;
            border-bottom: 1px solid #1a1a1a;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 20px;
            background: transparent;
            border: none;
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: #ffffff;
            border-bottom-color: #3b82f6;
        }

        .search-container {
            padding: 16px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
        }

        .search-box {
            position: relative;
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 14px;
            background: #000000;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #3b82f6;
            background: #0a0a0a;
        }

        .search-input::placeholder {
            color: #4b5563;
        }

        .menu-list {
            max-height: 400px;
            overflow-y: auto;
            background: #0a0a0a;
        }

        .menu-list::-webkit-scrollbar {
            width: 8px;
        }

        .menu-list::-webkit-scrollbar-track {
            background: #000000;
        }

        .menu-list::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 4px;
        }

        .menu-list::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }

        .menu-item {
            padding: 14px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .menu-item:hover {
            background: #141414;
        }

        .menu-item.selected {
            background: #1e3a8a;
            border-left: 3px solid #3b82f6;
        }

        .menu-item.selected .item-label {
            color: #ffffff;
            font-weight: 600;
        }

        .item-label {
            color: #d1d5db;
            font-size: 14px;
            font-weight: 500;
        }

        .item-action {
            color: #6b7280;
            font-size: 16px;
            transition: all 0.2s;
        }

        .menu-item:hover .item-action {
            color: #9ca3af;
        }

        .menu-item.selected .item-action {
            color: #60a5fa;
        }

        .menu-footer {
            background: #000000;
            border-top: 1px solid #1a1a1a;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-brand {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
        }

        .footer-counter {
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
        }

        .toggle-indicator {
            width: 40px;
            height: 22px;
            background: #1f2937;
            border-radius: 11px;
            position: relative;
            transition: all 0.3s;
        }

        .toggle-indicator.active {
            background: #3b82f6;
        }

        .toggle-indicator::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: all 0.3s;
        }

        .toggle-indicator.active::after {
            left: 21px;
        }

        .slider-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-bar {
            width: 80px;
            height: 4px;
            background: #1f2937;
            border-radius: 2px;
            position: relative;
        }

        .slider-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 2px;
            transition: width 0.2s;
        }

        .slider-value {
            color: #3b82f6;
            font-size: 12px;
            font-weight: 600;
            min-width: 35px;
            text-align: right;
        }

        .category-header {
            padding: 12px 20px;
            background: #000000;
            border-bottom: 1px solid #1a1a1a;
            color: #6b7280;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="menu-container" id="menuContainer">
        <div class="menu-header">
            <div class="menu-logo">🐴</div>
            <div class="menu-title">Korium</div>
        </div>

        <div class="menu-tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Bypasses</button>
            <button class="tab-btn" onclick="switchTab(1)">Next Bypass</button>
            <button class="tab-btn" onclick="switchTab(2)">Resources</button>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Search" id="searchInput" oninput="filterItems()">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div class="menu-list" id="menuList">
            <!-- Items will be injected here -->
        </div>

        <div class="menu-footer">
            <div class="footer-brand">Korium.cc</div>
            <div class="footer-counter" id="footerCounter">1/15</div>
        </div>
    </div>

    <script>
        let menuData = [
            { category: "Player", items: [
                { label: "basic-gamemode", type: "toggle", value: true, action: "gamemode" },
                { label: "bob74_ipl", type: "button", action: "ipl" },
                { label: "chat", type: "toggle", value: false, action: "chat" },
                { label: "chat-theme-gtao", type: "button", action: "chattheme" },
                { label: "escrow-asset", type: "button", action: "escrow" },
                { label: "fivem-map-skater", type: "button", action: "mapskater" },
                { label: "fivem-test-server", type: "button", action: "testserver" },
                { label: "hardcap", type: "toggle", value: false, action: "hardcap" }
            ]},
            { category: "Weapon", items: [
                { label: "weapon-damage", type: "slider", value: 50, action: "weapondamage" },
                { label: "infinite-ammo", type: "toggle", value: false, action: "infiniteammo" },
                { label: "no-recoil", type: "toggle", value: true, action: "norecoil" }
            ]},
            { category: "Vehicle", items: [
                { label: "vehicle-speed", type: "slider", value: 75, action: "vehiclespeed" },
                { label: "vehicle-godmode", type: "toggle", value: false, action: "vehiclegodmode" }
            ]}
        ];

        let currentTab = 0;
        let currentIndex = 0;
        let filteredItems = [];
        let menuVisible = false;

        function getAllItems() {
            let items = [];
            menuData.forEach(cat => {
                cat.items.forEach(item => {
                    items.push({ ...item, category: cat.category });
                });
            });
            return items;
        }

        function filterItems() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const allItems = getAllItems();
            
            if (search === '') {
                filteredItems = allItems;
            } else {
                filteredItems = allItems.filter(item => 
                    item.label.toLowerCase().includes(search)
                );
            }
            
            currentIndex = 0;
            renderItems();
        }

        function renderItems() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';
            
            if (filteredItems.length === 0) {
                filteredItems = getAllItems();
            }

            let currentCategory = '';
            
            filteredItems.forEach((item, index) => {
                if (item.category !== currentCategory) {
                    currentCategory = item.category;
                    const header = document.createElement('div');
                    header.className = 'category-header';
                    header.textContent = currentCategory;
                    menuList.appendChild(header);
                }

                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                if (index === currentIndex) menuItem.classList.add('selected');
                
                const label = document.createElement('div');
                label.className = 'item-label';
                label.textContent = item.label;
                menuItem.appendChild(label);

                const action = document.createElement('div');
                action.className = 'item-action';

                if (item.type === 'toggle') {
                    const toggle = document.createElement('div');
                    toggle.className = 'toggle-indicator';
                    if (item.value) toggle.classList.add('active');
                    action.appendChild(toggle);
                } else if (item.type === 'slider') {
                    const slider = document.createElement('div');
                    slider.className = 'slider-indicator';
                    slider.innerHTML = `
                        <div class="slider-bar">
                            <div class="slider-fill" style="width: ${item.value}%"></div>
                        </div>
                        <div class="slider-value">${item.value}%</div>
                    `;
                    action.appendChild(slider);
                } else {
                    action.textContent = '🔍';
                }

                menuItem.appendChild(action);
                menuList.appendChild(menuItem);
            });

            updateFooter();
        }

        function updateFooter() {
            document.getElementById('footerCounter').textContent = 
                `${currentIndex + 1}/${filteredItems.length}`;
        }

        function switchTab(index) {
            currentTab = index;
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
        }

        function handleAction(item) {
            window.parent.postMessage(JSON.stringify({
                type: 'action',
                action: item.action,
                value: item.value
            }), '*');
        }

        window.addEventListener('message', function(event) {
            const data = event.data;
            if (!data || typeof data !== 'object') return;

            if (data.action === 'showUI') {
                menuVisible = data.visible;
                const container = document.getElementById('menuContainer');
                if (data.visible) {
                    container.classList.add('active');
                    filterItems();
                } else {
                    container.classList.remove('active');
                }
            }

            if (data.action === 'keydown' && menuVisible) {
                handleKeyPress(data.key);
            }
        });

        function handleKeyPress(key) {
            if (key === 'ArrowUp') {
                currentIndex = (currentIndex - 1 + filteredItems.length) % filteredItems.length;
                renderItems();
                scrollToSelected();
            } else if (key === 'ArrowDown') {
                currentIndex = (currentIndex + 1) % filteredItems.length;
                renderItems();
                scrollToSelected();
            } else if (key === 'ArrowLeft') {
                const item = filteredItems[currentIndex];
                if (item.type === 'slider' && item.value > 0) {
                    item.value = Math.max(0, item.value - 5);
                    renderItems();
                    handleAction(item);
                }
            } else if (key === 'ArrowRight') {
                const item = filteredItems[currentIndex];
                if (item.type === 'slider' && item.value < 100) {
                    item.value = Math.min(100, item.value + 5);
                    renderItems();
                    handleAction(item);
                }
            } else if (key === 'Enter') {
                const item = filteredItems[currentIndex];
                if (item.type === 'toggle') {
                    item.value = !item.value;
                    renderItems();
                    handleAction(item);
                } else if (item.type === 'button') {
                    handleAction(item);
                }
            }
        }

        function scrollToSelected() {
            const menuList = document.getElementById('menuList');
            const selected = menuList.querySelector('.menu-item.selected');
            if (selected) {
                selected.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        filterItems();
    </script>
</body>
</html>
